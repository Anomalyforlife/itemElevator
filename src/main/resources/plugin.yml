name: ItemElevators
version: '${version}'
main: it.anomalyforlife.itemelevators.ItemElevators
api-version: '1.21'
authors:
  - Anomalyforlife
description: Automatic item elevator between two special chests placed vertically.
softdepend:
  - Vault

commands:
  itemelevator:
    description: Main ItemElevators command
    usage: /<command> [reload|list|remove|give]
    permission: itemelevators.command
    aliases:
      - ie
      - elevator

permissions:
  itemelevators.command:
    description: Access to base ItemElevators commands
    default: op
  itemelevators.reload:
    description: Reload the plugin configuration
    default: op
  itemelevators.list:
    description: List all active elevators
    default: op
  itemelevators.remove:
    description: Remove the elevator the player is looking at
    default: op
  itemelevators.give:
    description: Give special elevator chest items to players
    default: op
  itemelevators.create:
    description: Create elevators by linking two special elevator chests
    default: true
  itemelevators.bypass-cost:
    description: Bypass the economy creation cost
    default: op
